<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="robots" content="noindex, nofollow">
<title>Drope Admin ✦</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --bg-card: #12121a;
    --bg-card-hover: #181822;
    --border: #1a1a22;
    --text: #ffffff;
    --text-dim: #888;
    --text-muted: #555;
    --pink: #ec4899;
    --pink-glow: rgba(236, 72, 153, 0.4);
    --lime: #bef264;
    --lilac: #a78bfa;
    --ultraviolet: #5B21B6;
    --green: #25D366;
    --red: #ef4444;
    --orange: #fb923c;
    --yellow: #fbbf24;
    --blue: #60a5fa;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; }
  a { color: var(--lilac); }

  /* === LOGIN === */
  .login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .login-card h1 {
    font-size: 32px;
    background: linear-gradient(90deg, var(--pink), var(--lilac));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .login-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  .login-card input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 12px;
    font-family: ui-monospace, monospace;
  }
  .login-card input:focus { border-color: var(--pink); outline: none; }
  .btn-primary {
    background: linear-gradient(90deg, var(--pink), var(--ultraviolet));
    color: white;
    border: none;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    width: 100%;
    transition: transform 0.1s;
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
  }

  /* === LAYOUT === */
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .topbar h1 {
    font-size: 22px;
    background: linear-gradient(90deg, var(--pink), var(--lilac));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--lime);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }
  .pulse-text { color: var(--text-dim); font-size: 12px; }
  .btn-secondary {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
  }
  .btn-secondary:hover { background: var(--bg-card-hover); color: var(--text); }

  /* === TABS === */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--bg-card);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .tab.active {
    background: linear-gradient(90deg, var(--pink), var(--ultraviolet));
    color: white;
  }

  /* === STATS === */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .stat-label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .stat-value { font-size: 24px; font-weight: 800; }
  .stat-value.pink { color: var(--pink); }
  .stat-value.lime { color: var(--lime); }
  .stat-value.orange { color: var(--orange); }

  /* === FILTERS === */
  .filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-chip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
  }
  .filter-chip.active {
    background: var(--pink);
    color: white;
    border-color: var(--pink);
  }

  /* === ORDER CARD === */
  .order {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .order:hover { border-color: var(--pink); }
  .order.cancelled { opacity: 0.5; }
  .order-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 12px; gap: 12px; flex-wrap: wrap;
  }
  .order-id {
    font-family: ui-monospace, monospace;
    font-size: 16px;
    font-weight: 700;
  }
  .order-time { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-created  { background: rgba(96,165,250,0.15); color: var(--blue); }
  .status-paid     { background: rgba(190,242,100,0.15); color: var(--lime); }
  .status-waiting_proof { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .status-pending_pickup { background: rgba(251,146,60,0.15); color: var(--orange); }
  .status-preparing { background: rgba(251,146,60,0.2); color: var(--orange); }
  .status-out_for_delivery { background: rgba(167,139,250,0.2); color: var(--lilac); }
  .status-ready_for_pickup { background: rgba(167,139,250,0.2); color: var(--lilac); }
  .status-delivered { background: rgba(190,242,100,0.25); color: var(--lime); }
  .status-picked_up { background: rgba(190,242,100,0.25); color: var(--lime); }
  .status-cancelled { background: rgba(239,68,68,0.15); color: var(--red); }

  .order-body { font-size: 13px; color: #ccc; line-height: 1.6; }
  .order-row { display: flex; justify-content: space-between; padding: 4px 0; }
  .order-row .label { color: var(--text-dim); }
  .order-items { margin: 8px 0; padding: 10px 12px; background: var(--bg); border-radius: 8px; font-size: 12px; }
  .order-items .item { padding: 2px 0; }
  .order-actions {
    display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .btn-action {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn-action.advance { border-color: var(--lime); color: var(--lime); }
  .btn-action.advance:hover { background: var(--lime); color: var(--bg); }
  .btn-action.cancel { border-color: var(--red); color: var(--red); }
  .btn-action.cancel:hover { background: var(--red); color: white; }
  .btn-action.whats { border-color: var(--green); color: var(--green); }
  .btn-action.whats:hover { background: var(--green); color: white; }
  .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

  .notify-toggle {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-dim); font-size: 12px;
    margin-left: auto;
  }
  .notify-toggle input { cursor: pointer; }

  /* === STOCK === */
  .stock-toolbar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; padding:12px 16px; background:rgba(255,255,255,0.02); border-radius:10px; margin-bottom:12px; }
  .stock-toolbar input[type=text] { flex:1; min-width:200px; padding:10px 14px; background:#0d0d10; border:1px solid #2a2a31; border-radius:8px; color:#fff; font-size:14px; outline:none; }
  .stock-toolbar input[type=text]:focus { border-color: var(--pink); }
  .stock-toggle { display:flex; gap:6px; align-items:center; color: var(--text-dim); font-size:13px; cursor:pointer; user-select:none; }
  .stock-toggle input { cursor:pointer; }
  .stock-count { color: var(--text-dim); font-size:12px; padding:0 4px; }
  .stock-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1fr auto auto auto auto;
    gap: 12px;
    align-items: center;
  }
  .stock-name { font-weight: 600; font-size: 14px; }
  .stock-meta { color: var(--text-dim); font-size: 11px; }
  .stock-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    width: 80px;
    text-align: center;
  }
  .stock-input:focus { border-color: var(--pink); outline: none; }
  .qty-zero { color: var(--red); font-weight: 700; }
  .qty-low { color: var(--orange); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }

  /* === TAREFAS === */
  .tasks-toolbar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px; align-items: center;
  }
  .tasks-toolbar .btn-action.advance { padding: 8px 14px; }
  .task-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .task-card:hover { border-color: var(--lilac); }
  .task-card.selected { border-color: var(--pink); }
  .task-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .task-title { font-weight: 700; font-size: 15px; line-height: 1.3; flex: 1; min-width: 0; }
  .task-meta {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    margin-bottom: 8px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 999px;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge.assignee-andrade { background: rgba(167,139,250,0.18); color: var(--lilac); }
  .badge.assignee-rafa    { background: rgba(96,165,250,0.18); color: var(--blue); }
  .badge.assignee-code    { background: rgba(190,242,100,0.18); color: var(--lime); }
  .badge.status-pending     { background: rgba(136,136,136,0.2); color: var(--text-dim); }
  .badge.status-in_progress { background: rgba(251,146,60,0.18); color: var(--orange); }
  .badge.status-done        { background: rgba(251,191,36,0.18); color: var(--yellow); }
  .badge.status-approved    { background: rgba(190,242,100,0.22); color: var(--lime); }
  .badge.status-rejected    { background: rgba(239,68,68,0.18); color: var(--red); }
  .badge.status-cancelled   { background: rgba(100,100,100,0.18); color: var(--text-muted); }
  .badge.priority-alta  { background: rgba(239,68,68,0.18); color: var(--red); }
  .badge.priority-media { background: rgba(251,191,36,0.18); color: var(--yellow); }
  .badge.priority-baixa { background: rgba(136,136,136,0.18); color: var(--text-dim); }
  .task-desc {
    font-size: 13px; color: #ccc; line-height: 1.5;
    max-height: 4.5em; overflow: hidden;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical; display: -webkit-box;
  }
  .task-foot {
    display: flex; justify-content: space-between;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-muted);
  }
  .task-feedback-preview {
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 12px; color: #bbb;
    border-left: 3px solid var(--lime);
  }
  .task-aitake-preview {
    margin-top: 6px;
    padding: 8px 10px;
    background: rgba(167,139,250,0.06);
    border-radius: 8px;
    font-size: 12px; color: #ccc;
    border-left: 3px solid var(--lilac);
  }

  /* === MODAL DETALHE TAREFA === */
  .task-modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    z-index: 100;
    overflow-y: auto;
    padding: 20px;
  }
  .task-modal-bg.open { display: flex; align-items: flex-start; justify-content: center; }
  .task-modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%; max-width: 600px;
    padding: 24px;
    margin-top: 40px;
    margin-bottom: 40px;
  }
  .task-modal h2 {
    font-size: 18px; margin-bottom: 14px; line-height: 1.3;
    background: linear-gradient(90deg, var(--pink), var(--lilac));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .task-modal .field { margin-bottom: 14px; }
  .task-modal .field-label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .task-modal .field-value {
    font-size: 14px; line-height: 1.5; color: var(--text);
    white-space: pre-wrap; word-wrap: break-word;
  }
  .task-modal textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
  }
  .task-modal textarea:focus { border-color: var(--pink); outline: none; }
  .task-modal .modal-actions {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .task-modal .btn-action.approve { border-color: var(--lime); color: var(--lime); }
  .task-modal .btn-action.approve:hover { background: var(--lime); color: var(--bg); }
  .task-modal .btn-action.reject  { border-color: var(--orange); color: var(--orange); }
  .task-modal .btn-action.reject:hover { background: var(--orange); color: var(--bg); }
  .task-modal .close-x {
    float: right; background: transparent; border: none;
    color: var(--text-dim); font-size: 22px; cursor: pointer;
    margin-top: -8px;
  }

  /* === FORM CRIAR TAREFA === */
  .new-task-form .field input,
  .new-task-form .field select,
  .new-task-form .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
  }
  .new-task-form .field input:focus,
  .new-task-form .field select:focus,
  .new-task-form .field textarea:focus { border-color: var(--pink); outline: none; }
  .new-task-form textarea { resize: vertical; min-height: 80px; }
  .new-task-form .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 600px) {
    .new-task-form .row { grid-template-columns: 1fr; }
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 9999;
    animation: slideUp 0.3s;
  }
  .toast.success { border-color: var(--lime); }
  .toast.error { border-color: var(--red); }
  @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stock-toolbar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; padding:12px 16px; background:rgba(255,255,255,0.02); border-radius:10px; margin-bottom:12px; }
  .stock-toolbar input[type=text] { flex:1; min-width:200px; padding:10px 14px; background:#0d0d10; border:1px solid #2a2a31; border-radius:8px; color:#fff; font-size:14px; outline:none; }
  .stock-toolbar input[type=text]:focus { border-color: var(--pink); }
  .stock-toggle { display:flex; gap:6px; align-items:center; color: var(--text-dim); font-size:13px; cursor:pointer; user-select:none; }
  .stock-toggle input { cursor:pointer; }
  .stock-count { color: var(--text-dim); font-size:12px; padding:0 4px; }
  .stock-card { grid-template-columns: 1fr; gap: 8px; }
    .stock-card .stock-input { width: 100%; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Drope Admin ✦</h1>
    <p>cole o ADMIN_TOKEN configurado no Vercel</p>
    <input type="password" id="tokenInput" placeholder="ADMIN_TOKEN" autocomplete="off" spellcheck="false">
    <button class="btn-primary" onclick="login()">entrar ✦</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="app" id="dashboard" style="display: none;">

  <div class="topbar">
    <h1>Drope Admin ✦</h1>
    <div class="topbar-actions">
      <span class="pulse-dot"></span>
      <span class="pulse-text" id="lastUpdate">atualizando...</span>
      <button class="btn-secondary" onclick="logout()">sair</button>
    </div>
  </div>

  <div class="tabs" id="tabsBar">
    <button class="tab active" data-tab="orders" onclick="switchTab('orders')">📦 pedidos</button>
    <button class="tab" data-tab="stock" onclick="switchTab('stock')">📊 estoque</button>
    <button class="tab" data-tab="tarefas" onclick="switchTab('tarefas')">✅ tarefas</button>
  </div>

  <!-- TAB: ORDERS -->
  <div id="tabOrders">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">hoje</div>
        <div class="stat-value pink" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">em andamento</div>
        <div class="stat-value orange" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">finalizados</div>
        <div class="stat-value lime" id="statDone">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">receita hoje</div>
        <div class="stat-value lime" id="statRevenue">—</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">todos</button>
      <button class="filter-chip" data-filter="pending" onclick="setFilter('pending')">em andamento</button>
      <button class="filter-chip" data-filter="paid" onclick="setFilter('paid')">novos pagos</button>
      <button class="filter-chip" data-filter="preparing" onclick="setFilter('preparing')">preparando</button>
      <button class="filter-chip" data-filter="out_for_delivery,ready_for_pickup" onclick="setFilter('out_for_delivery,ready_for_pickup')">a caminho</button>
      <button class="filter-chip" data-filter="delivered,picked_up" onclick="setFilter('delivered,picked_up')">finalizados</button>
      <button class="filter-chip" data-filter="cancelled" onclick="setFilter('cancelled')">cancelados</button>
    </div>

    <div id="ordersList"></div>
  </div>

  <!-- TAB: STOCK -->
  <div id="tabStock" style="display: none;">
    <div class="stock-toolbar">
      <input id="stockSearch" type="text" placeholder="buscar nome / slug / categoria..." oninput="renderStock()" />
      <label class="stock-toggle"><input id="filterHiddenOnly" type="checkbox" onchange="renderStock()" /> so pendentes (sem preco)</label>
      <span class="stock-count" id="stockCount"></span>
    </div>
    <div id="stockList"></div>
  </div>

  <!-- TAB: TAREFAS -->
  <div id="tabTarefas" style="display: none;">
    <div class="stats-grid" id="tasksStats">
      <div class="stat-card">
        <div class="stat-label">ativas</div>
        <div class="stat-value pink" id="tStatAtivas">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">aguardando voce</div>
        <div class="stat-value orange" id="tStatAguard">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">aprovadas</div>
        <div class="stat-value lime" id="tStatAprov">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">refazer</div>
        <div class="stat-value" id="tStatRej" style="color: var(--red);">—</div>
      </div>
    </div>

    <div class="tasks-toolbar" id="tasksToolbar">
      <button class="btn-action advance" id="btnNewTask" onclick="openNewTaskModal()">+ nova tarefa</button>
      <div style="flex:1;"></div>
    </div>

    <div class="filters" id="tasksFilters">
      <button class="filter-chip active" data-tfilter="ativas"   onclick="setTaskFilter('ativas')">ativas</button>
      <button class="filter-chip"        data-tfilter="andrade"  onclick="setTaskFilter('andrade')">⚖️ minhas</button>
      <button class="filter-chip"        data-tfilter="rafa"     onclick="setTaskFilter('rafa')">👤 rafa</button>
      <button class="filter-chip"        data-tfilter="code"     onclick="setTaskFilter('code')">🤖 code</button>
      <button class="filter-chip"        data-tfilter="done"     onclick="setTaskFilter('done')">aguard. martelo</button>
      <button class="filter-chip"        data-tfilter="alta"     onclick="setTaskFilter('alta')">🔴 alta</button>
      <button class="filter-chip"        data-tfilter="all"      onclick="setTaskFilter('all')">tudo</button>
    </div>

    <div id="tasksList"></div>
  </div>

</div>

<!-- TASK MODAL (detalhe) -->
<div class="task-modal-bg" id="taskModalBg" onclick="if(event.target===this)closeTaskModal()">
  <div class="task-modal" id="taskModal">
    <button class="close-x" onclick="closeTaskModal()">×</button>
    <div id="taskModalBody"></div>
  </div>
</div>

<!-- NEW TASK MODAL -->
<div class="task-modal-bg" id="newTaskModalBg" onclick="if(event.target===this)closeNewTaskModal()">
  <div class="task-modal new-task-form">
    <button class="close-x" onclick="closeNewTaskModal()">×</button>
    <h2>nova tarefa</h2>
    <div class="field">
      <div class="field-label">título</div>
      <input type="text" id="ntTitle" maxlength="200" placeholder="ex: conferir estoque do mango magic">
    </div>
    <div class="field">
      <div class="field-label">descrição</div>
      <textarea id="ntDesc" maxlength="4000" placeholder="contexto, links, o que precisa ser feito..."></textarea>
    </div>
    <div class="row">
      <div class="field">
        <div class="field-label">atribuir a</div>
        <select id="ntAssignee">
          <option value="andrade">andrade (eu)</option>
          <option value="rafa">rafa</option>
          <option value="code">code (ia)</option>
        </select>
      </div>
      <div class="field">
        <div class="field-label">prioridade</div>
        <select id="ntPriority">
          <option value="alta">🔴 alta</option>
          <option value="media" selected>🟡 média</option>
          <option value="baixa">🟢 baixa</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <div class="field-label">categoria (opcional)</div>
        <input type="text" id="ntCategory" maxlength="40" placeholder="ex: estoque, bot, infra">
      </div>
      <div class="field">
        <div class="field-label">prazo (opcional)</div>
        <input type="date" id="ntDueDate">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-action advance" onclick="submitNewTask()">criar</button>
      <button class="btn-action" onclick="closeNewTaskModal()">cancelar</button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toastContainer"></div>

<script>
// 🔒 token nunca commitado — só vive no localStorage do admin
const STORAGE_KEY = 'drope_admin_token_v1';
let adminToken = '';
let currentTab = 'orders';
let currentFilter = 'all';
let pollTimer = null;
let lastOrders = [];
let lastProducts = [];

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function fmtBRL(cents) { return (cents / 100).toFixed(2).replace('.', ','); }

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// === AUTH ===
async function login() {
  const input = document.getElementById('tokenInput');
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  const token = input.value.trim();
  if (!token) { errEl.textContent = 'cola o token primeiro'; return; }

  // testa o token chamando admin-orders
  try {
    const r = await fetch('/api/admin-orders?limit=1', { headers: { 'x-admin-token': token } });
    if (r.status === 401) { errEl.textContent = 'token invalido'; return; }
    if (!r.ok) { errEl.textContent = 'erro: ' + r.status; return; }
    // sucesso
    adminToken = token;
    localStorage.setItem(STORAGE_KEY, token);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    startPolling();
  } catch(e) {
    errEl.textContent = 'erro de rede: ' + e.message;
  }
}

function logout() {
  if (!confirm('Sair do admin?')) return;
  localStorage.removeItem(STORAGE_KEY);
  adminToken = '';
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// === TABS ===
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('tabOrders').style.display  = tab === 'orders'  ? 'block' : 'none';
  document.getElementById('tabStock').style.display   = tab === 'stock'   ? 'block' : 'none';
  document.getElementById('tabTarefas').style.display = tab === 'tarefas' ? 'block' : 'none';
  if (tab === 'orders')  loadOrders();
  if (tab === 'stock')   loadStock();
  if (tab === 'tarefas') loadTasks();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
  renderOrders();
}

// === ORDERS ===
async function loadOrders() {
  try {
    const r = await fetch('/api/admin-orders?limit=200', { headers: { 'x-admin-token': adminToken } });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    if (!data.ok) { toast('erro carregando pedidos', 'error'); return; }
    lastOrders = data.orders || [];
    updateStats(data.stats);
    renderOrders();
    document.getElementById('lastUpdate').textContent = 'atualizado ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    console.error(e);
    document.getElementById('lastUpdate').textContent = 'offline ⚠';
  }
}

function updateStats(stats) {
  if (!stats) return;
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statPending').textContent = stats.pending;
  document.getElementById('statDone').textContent = stats.done;
  document.getElementById('statRevenue').textContent = 'R$ ' + fmtBRL(stats.revenue_cents);
}

function filteredOrders() {
  if (currentFilter === 'all') return lastOrders;
  if (currentFilter === 'pending') {
    return lastOrders.filter(o => ['created','paid','preparing','out_for_delivery','ready_for_pickup','waiting_proof','pending_pickup'].includes(o.status));
  }
  const list = currentFilter.split(',');
  return lastOrders.filter(o => list.includes(o.status));
}

function renderOrders() {
  const list = filteredOrders();
  const wrap = document.getElementById('ordersList');
  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="icon">📭</div><div>nenhum pedido nesse filtro</div></div>`;
    return;
  }
  wrap.innerHTML = list.map(o => renderOrder(o)).join('');
}

function renderOrder(o) {
  const items = (o.items || []).map(i => `<div class="item">${escapeHtml(i.qty || 1)}× ${escapeHtml(i.name)} — r$ ${escapeHtml(((i.price || 0) * (i.qty || 1)))}</div>`).join('');
  const customer = o.customer_snapshot || {};
  const addr = o.address;
  let where = o.delivery_mode === 'pickup' ? '🏪 retirada' : '🛵 entrega';
  if (addr) where += ` — ${escapeHtml(addr.street || '')}, ${escapeHtml(addr.num || '')}${addr.comp ? ' · ' + escapeHtml(addr.comp) : ''}`;
  if (addr?.neigh) where += ` · ${escapeHtml(addr.neigh)}`;

  const nextActions = nextStatusActions(o);
  const trackUrl = o.customer_track_token ? `${location.origin}/#track/${o.customer_track_token}` : '';

  return `
    <div class="order ${o.status === 'cancelled' ? 'cancelled' : ''}">
      <div class="order-head">
        <div>
          <div class="order-id">#${escapeHtml(o.order_nsu)}</div>
          <div class="order-time">${escapeHtml(fmtTime(o.created_at))}</div>
        </div>
        <span class="status-badge status-${escapeHtml(o.status)}">${escapeHtml(o.status.replace(/_/g, ' '))}</span>
      </div>
      <div class="order-body">
        <div class="order-row"><span class="label">cliente</span><span>${escapeHtml(customer.name || '—')} · ${escapeHtml(customer.phone || '')}</span></div>
        <div class="order-row"><span class="label">${escapeHtml(o.delivery_mode || 'mode')}</span><span>${where}</span></div>
        <div class="order-row"><span class="label">pagamento</span><span>${escapeHtml(o.payment_method)}</span></div>
        <div class="order-row"><span class="label">total</span><span><strong>R$ ${fmtBRL(o.total_cents)}</strong></span></div>
        <div class="order-items">${items}</div>
        ${trackUrl ? `<div class="order-row"><span class="label">link cliente</span><a href="${escapeHtml(trackUrl)}" target="_blank" style="font-size:11px;">acompanhar</a></div>` : ''}
      </div>
      <div class="order-actions">
        ${nextActions.map(a => `<button class="btn-action ${a.cls}" onclick="updateStatus('${escapeHtml(o.order_nsu)}', '${escapeHtml(a.status)}')">${a.label}</button>`).join('')}
        ${o.status !== 'cancelled' && o.status !== 'delivered' && o.status !== 'picked_up' ? `<button class="btn-action cancel" onclick="updateStatus('${escapeHtml(o.order_nsu)}', 'cancelled')">cancelar</button>` : ''}
        <label class="notify-toggle"><input type="checkbox" id="notify-${escapeHtml(o.order_nsu)}" checked> notificar whats</label>
      </div>
    </div>
  `;
}

function nextStatusActions(o) {
  // próximas ações disponíveis baseado no status atual
  const isPickup = o.delivery_mode === 'pickup';
  const flow = {
    created:           [{ status: 'paid', label: '→ marcar pago', cls: 'advance' }],
    waiting_proof:     [{ status: 'paid', label: '→ comprovante OK', cls: 'advance' }],
    pending_pickup:    [{ status: 'preparing', label: '→ preparar', cls: 'advance' }],
    paid:              [{ status: 'preparing', label: '→ preparar', cls: 'advance' }],
    preparing:         isPickup
                         ? [{ status: 'ready_for_pickup', label: '→ pronto pra retirar', cls: 'advance' }]
                         : [{ status: 'out_for_delivery', label: '→ saiu pra entrega', cls: 'advance' }],
    out_for_delivery:  [{ status: 'delivered', label: '✓ entregue', cls: 'advance' }],
    ready_for_pickup:  [{ status: 'picked_up', label: '✓ retirado', cls: 'advance' }],
    delivered:         [],
    picked_up:         [],
    cancelled:         [],
  };
  return flow[o.status] || [];
}

async function updateStatus(orderNsu, newStatus) {
  if (newStatus === 'cancelled' && !confirm('Cancelar pedido #' + orderNsu + '? Devolve estoque dos itens.')) return;
  const notifyEl = document.getElementById('notify-' + orderNsu);
  const notify = notifyEl ? notifyEl.checked : false;

  try {
    const r = await fetch('/api/admin-update-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: JSON.stringify({ order_nsu: orderNsu, status: newStatus, notify_customer: notify }),
    });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    if (!r.ok) { toast('erro: ' + (data.error || r.status), 'error'); return; }
    toast(`#${orderNsu} → ${newStatus}${notify ? ' + whats enviado' : ''}`, 'success');
    loadOrders();
  } catch(e) {
    toast('erro de rede: ' + e.message, 'error');
  }
}

// === STOCK ===
async function loadStock() {
  try {
    // usa endpoint admin que retorna TUDO (incluindo hidden=true cadastrados pelo whats agent)
    const r = await fetch('/api/admin-list-stock', { headers: { 'x-admin-token': adminToken } });
    const data = await r.json();
    if (!data.ok) { toast('erro carregando estoque', 'error'); return; }
    lastProducts = data.products || [];
    renderStock();
  } catch(e) {
    toast('erro: ' + e.message, 'error');
  }
}

function renderStock() {
  const wrap = document.getElementById('stockList');
  const countEl = document.getElementById('stockCount');
  const search = (document.getElementById('stockSearch')?.value || '').toLowerCase().trim();
  const hiddenOnly = document.getElementById('filterHiddenOnly')?.checked || false;

  let filtered = lastProducts;
  if (hiddenOnly) filtered = filtered.filter(p => p.hidden);
  if (search) filtered = filtered.filter(p =>
    (p.name || '').toLowerCase().includes(search) ||
    (p.slug || '').toLowerCase().includes(search) ||
    (p.category || '').toLowerCase().includes(search)
  );

  if (countEl) countEl.textContent = filtered.length === lastProducts.length ? ` produtos` : ` de `;

  if (lastProducts.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="icon">📦</div><div>sem produtos cadastrados<br><small>roda a migration osso8 no Supabase</small></div></div>`;
    return;
  }
  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="icon">🔍</div><div>nada encontrado pra esse filtro</div></div>`;
    return;
  }
  wrap.innerHTML = filtered.map(p => {
    const qtyClass = p.qty_available === 0 ? 'qty-zero' : p.qty_available < 5 ? 'qty-low' : '';
    return `
      <div class="stock-card">
        <div>
          <div class="stock-name">${escapeHtml(p.name)} ${p.badge ? `<span style="color:var(--pink);font-size:11px;">✦ ${escapeHtml(p.badge)}</span>` : ''}</div>
          <div class="stock-meta">${escapeHtml(p.category || 'sem categoria')} · slug: ${escapeHtml(p.slug)}</div>
        </div>
        <div>
          <div class="stock-meta">preço (R$)</div>
          <input class="stock-input" type="number" step="0.01" id="price-${escapeHtml(p.slug)}" value="${((p.price_cents || 0) / 100).toFixed(2)}" min="0">
        </div>
        <div>
          <div class="stock-meta">estoque</div>
          <input class="stock-input ${qtyClass}" type="number" id="qty-${escapeHtml(p.slug)}" value="${escapeHtml(p.qty_available)}" min="0">
        </div>
        <button class="btn-action advance" onclick="saveStock('${escapeHtml(p.slug)}')">salvar</button>
        <button class="btn-action cancel" onclick="toggleHidden('${escapeHtml(p.slug)}', ${!p.hidden})">${p.hidden ? 'mostrar' : 'esconder'}</button>
        <button class="btn-action" style="background:#3a1a5a;color:#c4b5fd;border:1px solid #4a2a6a;" onclick="regenerateArt('${escapeHtml(p.slug)}', this)">🔄 arte</button>
        ${p.hidden ? '<span class="btn-action" style="opacity:0.4;cursor:not-allowed;" title="publica primeiro pra ver no app">🔗 app</span>' : `<button class="btn-action" style="background:#1a3a5a;color:#7dd3fc;border:1px solid #2a4a6a;" onclick="window.open('/#produto/' + encodeURIComponent('${escapeHtml(p.slug)}'), '_blank')">🔗 app</button>`}
      </div>
    `;
  }).join('');
}

async function regenerateArt(slug, btn) {
  if (!adminToken) { toast('login expirado', 'error'); return; }
  const original = btn.textContent;
  btn.textContent = '⏳ gerando...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/admin-regenerate-art', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: JSON.stringify({ slug }),
    });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    if (!r.ok || !data.ok) { toast('arte falhou: ' + (data.error || r.status), 'error'); btn.textContent = original; btn.disabled = false; return; }
    toast('arte regerada ✦ ' + slug, 'success');
    btn.textContent = '✦ ok';
    setTimeout(() => loadStock(), 1500);
  } catch(e) {
    toast('erro: ' + e.message, 'error');
    btn.textContent = original;
    btn.disabled = false;
  }
}

async function saveStock(slug) {
  const qty = parseInt(document.getElementById('qty-' + slug).value, 10);
  const priceReais = parseFloat(document.getElementById('price-' + slug).value);
  if (isNaN(qty) || qty < 0) { toast('qty inválido', 'error'); return; }
  if (isNaN(priceReais) || priceReais < 0) { toast('preço inválido', 'error'); return; }
  const price = Math.round(priceReais * 100); // converte R$ pra centavos

  try {
    const r = await fetch('/api/admin-update-stock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: JSON.stringify({ slug, qty_available: qty, price_cents: price }),
    });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    if (!r.ok) { toast('erro: ' + (data.error || r.status), 'error'); return; }
    toast(`${slug}: qty=${qty}, preço=R$${(price/100).toFixed(2)}`, 'success');
    loadStock();
  } catch(e) {
    toast('erro: ' + e.message, 'error');
  }
}

async function toggleHidden(slug, hide) {
  try {
    const r = await fetch('/api/admin-update-stock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: JSON.stringify({ slug, hidden: hide }),
    });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    if (!r.ok) { toast('erro: ' + (data.error || r.status), 'error'); return; }
    toast(`${slug}: ${hide ? 'escondido' : 'visível'}`, 'success');
    loadStock();
  } catch(e) {
    toast('erro: ' + e.message, 'error');
  }
}

// === POLLING (quase-realtime, 10s) ===
function startPolling() {
  if (rafaMode) {
    loadTasks();
    pollTimer = setInterval(() => loadTasks(), 15000);
    return;
  }
  loadOrders();
  pollTimer = setInterval(() => {
    if (currentTab === 'orders') loadOrders();
    if (currentTab === 'tarefas') loadTasks();
  }, 10000);
}

// =========================================================================
// === TAREFAS (TAREFA 6 — painel drope_tasks) =============================
// =========================================================================
const RAFA_TOKEN_KEY = 'drope_rafa_token_v1';
let rafaMode = false;
let rafaToken = '';
let lastTasks = [];
let currentTaskFilter = 'ativas';
let openedTaskId = null;

function authHeaders() {
  return rafaMode
    ? { 'x-rafa-token': rafaToken }
    : { 'x-admin-token': adminToken };
}

function escapeAttr(s) { return escapeHtml(s); }

function priorityRank(p) { return p === 'alta' ? 1 : p === 'media' ? 2 : 3; }

async function loadTasks() {
  try {
    const r = await fetch('/api/tasks-list?limit=300', { headers: authHeaders() });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    if (!data.ok) { toast('erro carregando tarefas', 'error'); return; }
    lastTasks = data.tasks || [];
    updateTasksStats(lastTasks);
    renderTasks();
  } catch(e) {
    console.error('[loadTasks]', e);
  }
}

function updateTasksStats(tasks) {
  const ativas   = tasks.filter(t => t.status === 'pending' || t.status === 'in_progress').length;
  const aguardando = tasks.filter(t => t.status === 'done').length;
  const aprovadas  = tasks.filter(t => t.status === 'approved').length;
  const refazer    = tasks.filter(t => t.status === 'rejected').length;
  document.getElementById('tStatAtivas').textContent = ativas;
  document.getElementById('tStatAguard').textContent = aguardando;
  document.getElementById('tStatAprov').textContent  = aprovadas;
  document.getElementById('tStatRej').textContent    = refazer;
}

function setTaskFilter(f) {
  currentTaskFilter = f;
  document.querySelectorAll('.filter-chip[data-tfilter]').forEach(c =>
    c.classList.toggle('active', c.dataset.tfilter === f));
  renderTasks();
}

function filteredTasks() {
  let list = lastTasks;
  switch (currentTaskFilter) {
    case 'ativas':  list = list.filter(t => ['pending','in_progress','done','rejected'].includes(t.status)); break;
    case 'andrade': list = list.filter(t => t.assignee === 'andrade' && t.status !== 'approved' && t.status !== 'cancelled'); break;
    case 'rafa':    list = list.filter(t => t.assignee === 'rafa' && t.status !== 'approved' && t.status !== 'cancelled'); break;
    case 'code':    list = list.filter(t => t.assignee === 'code' && t.status !== 'approved' && t.status !== 'cancelled'); break;
    case 'done':    list = list.filter(t => t.status === 'done'); break;
    case 'alta':    list = list.filter(t => t.priority === 'alta' && t.status !== 'approved' && t.status !== 'cancelled'); break;
    case 'all':     break;
  }
  return list.sort((a, b) => {
    const ps = priorityRank(a.priority) - priorityRank(b.priority);
    if (ps !== 0) return ps;
    return new Date(b.created_at) - new Date(a.created_at);
  });
}

function renderTasks() {
  const list = filteredTasks();
  const wrap = document.getElementById('tasksList');
  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="icon">✨</div><div>nenhuma tarefa nesse filtro</div></div>`;
    return;
  }
  wrap.innerHTML = list.map(t => renderTaskCard(t)).join('');
}

function renderTaskCard(t) {
  const desc = t.description ? `<div class="task-desc">${escapeHtml(t.description)}</div>` : '';
  const fbR  = t.feedback_rafa ? `<div class="task-feedback-preview">visão do rafa: ${escapeHtml(t.feedback_rafa).slice(0, 200)}${t.feedback_rafa.length > 200 ? '...' : ''}</div>` : '';
  const aiT  = t.ai_take ? `<div class="task-aitake-preview">opinião ia: ${escapeHtml(t.ai_take).slice(0, 200)}${t.ai_take.length > 200 ? '...' : ''}</div>` : '';
  const due  = t.due_date ? `· prazo ${escapeHtml(t.due_date)}` : '';
  return `
    <div class="task-card ${openedTaskId === t.id ? 'selected' : ''}" onclick="openTaskModal('${escapeAttr(t.id)}')">
      <div class="task-head">
        <div class="task-title">${escapeHtml(t.title)}</div>
        <span class="badge priority-${escapeHtml(t.priority)}">${escapeHtml(t.priority)}</span>
      </div>
      <div class="task-meta">
        <span class="badge assignee-${escapeHtml(t.assignee)}">${escapeHtml(t.assignee)}</span>
        <span class="badge status-${escapeHtml(t.status)}">${escapeHtml(t.status.replace(/_/g, ' '))}</span>
        ${t.category ? `<span class="badge" style="background:rgba(167,139,250,0.1);color:var(--lilac);">${escapeHtml(t.category)}</span>` : ''}
      </div>
      ${desc}
      ${fbR}
      ${aiT}
      <div class="task-foot">
        <span>criada ${escapeHtml(fmtTime(t.created_at))}${due}</span>
        <span>tap pra abrir →</span>
      </div>
    </div>
  `;
}

function openTaskModal(id) {
  const t = lastTasks.find(x => x.id === id);
  if (!t) return;
  openedTaskId = id;
  const body = document.getElementById('taskModalBody');
  const isAdmin = !rafaMode;
  const isMyRafaTask = rafaMode && t.assignee === 'rafa';

  const actions = [];
  if (isAdmin) {
    if (t.status === 'done') {
      actions.push(`<button class="btn-action approve" onclick="updateTask('${escapeAttr(id)}', {status:'approved'})">✓ aprovar</button>`);
      actions.push(`<button class="btn-action reject" onclick="rejectTaskPrompt('${escapeAttr(id)}')">↩ refazer</button>`);
    }
    if (t.status === 'pending' || t.status === 'rejected') {
      actions.push(`<button class="btn-action advance" onclick="updateTask('${escapeAttr(id)}', {status:'in_progress'})">→ em andamento</button>`);
    }
    if (t.status === 'in_progress') {
      actions.push(`<button class="btn-action advance" onclick="updateTask('${escapeAttr(id)}', {status:'done'})">✓ marcar feita</button>`);
    }
    if (t.status !== 'cancelled' && t.status !== 'approved') {
      actions.push(`<button class="btn-action cancel" onclick="if(confirm('cancelar essa tarefa?'))updateTask('${escapeAttr(id)}', {status:'cancelled'})">cancelar</button>`);
    }
  }
  if (isMyRafaTask) {
    if (t.status === 'pending')     actions.push(`<button class="btn-action advance" onclick="updateTask('${escapeAttr(id)}', {status:'in_progress'})">→ comecei</button>`);
    if (t.status === 'in_progress') actions.push(`<button class="btn-action approve" onclick="rafaSubmitDone('${escapeAttr(id)}')">✓ concluí</button>`);
    if (t.status === 'rejected')    actions.push(`<button class="btn-action advance" onclick="updateTask('${escapeAttr(id)}', {status:'in_progress'})">→ refazendo</button>`);
  }

  body.innerHTML = `
    <h2>${escapeHtml(t.title)}</h2>
    <div class="task-meta">
      <span class="badge assignee-${escapeHtml(t.assignee)}">${escapeHtml(t.assignee)}</span>
      <span class="badge status-${escapeHtml(t.status)}">${escapeHtml(t.status.replace(/_/g, ' '))}</span>
      <span class="badge priority-${escapeHtml(t.priority)}">${escapeHtml(t.priority)}</span>
      ${t.category ? `<span class="badge" style="background:rgba(167,139,250,0.1);color:var(--lilac);">${escapeHtml(t.category)}</span>` : ''}
    </div>
    ${t.description ? `<div class="field"><div class="field-label">descrição</div><div class="field-value">${escapeHtml(t.description)}</div></div>` : ''}
    ${t.feedback_rafa ? `<div class="field"><div class="field-label">visão do rafa</div><div class="field-value">${escapeHtml(t.feedback_rafa)}</div></div>` : ''}
    ${t.ai_take ? `<div class="field"><div class="field-label">opinião ia</div><div class="field-value">${escapeHtml(t.ai_take)}</div></div>` : ''}
    ${(!rafaMode && t.feedback_andrade) ? `<div class="field"><div class="field-label">sua resposta</div><div class="field-value">${escapeHtml(t.feedback_andrade)}</div></div>` : ''}
    ${isMyRafaTask ? `
      <div class="field">
        <div class="field-label">sua visão / observações</div>
        <textarea id="rafaFeedbackInput" maxlength="4000" placeholder="conta o que viu, o que achou, o que tava diferente...">${escapeHtml(t.feedback_rafa || '')}</textarea>
        <button class="btn-action advance" style="margin-top:8px;" onclick="rafaSaveFeedback('${escapeAttr(id)}')">salvar visão</button>
      </div>
    ` : ''}
    ${(isAdmin && t.status === 'done') ? `
      <div class="field">
        <div class="field-label">sua resposta (opcional)</div>
        <textarea id="adminFeedbackInput" maxlength="4000" placeholder="comentário/justificativa...">${escapeHtml(t.feedback_andrade || '')}</textarea>
      </div>
    ` : ''}
    <div class="modal-actions">
      ${actions.join('')}
      <button class="btn-action" onclick="closeTaskModal()">fechar</button>
    </div>
    <div class="task-foot" style="margin-top:14px;">
      <span>criada ${escapeHtml(fmtTime(t.created_at))} por ${escapeHtml(t.created_by)}</span>
      <span>id: ${escapeHtml((t.id || '').slice(0, 8))}</span>
    </div>
  `;
  document.getElementById('taskModalBg').classList.add('open');
}

function closeTaskModal() {
  document.getElementById('taskModalBg').classList.remove('open');
  openedTaskId = null;
}

async function updateTask(id, patch) {
  if (!rafaMode && (patch.status === 'approved' || patch.status === 'rejected')) {
    const el = document.getElementById('adminFeedbackInput');
    if (el && el.value.trim()) patch.feedback_andrade = el.value.trim();
  }
  try {
    const r = await fetch('/api/tasks-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ id, ...patch }),
    });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    if (!r.ok) { toast('erro: ' + (data.error || r.status), 'error'); return; }
    toast(`tarefa ${patch.status ? '→ ' + patch.status : 'atualizada'}`, 'success');
    closeTaskModal();
    loadTasks();
  } catch(e) {
    toast('erro: ' + e.message, 'error');
  }
}

function rejectTaskPrompt(id) {
  const reason = prompt('Motivo / o que precisa refazer:');
  if (reason === null) return;
  const patch = { status: 'rejected' };
  if (reason.trim()) patch.feedback_andrade = reason.trim();
  updateTask(id, patch);
}

function rafaSaveFeedback(id) {
  const text = document.getElementById('rafaFeedbackInput')?.value?.trim() || '';
  updateTask(id, { feedback_rafa: text });
}

function rafaSubmitDone(id) {
  const text = document.getElementById('rafaFeedbackInput')?.value?.trim() || '';
  if (!text || text.length < 5) {
    if (!confirm('Marcar como concluída sem deixar visão? (recomendado deixar pelo menos 1 linha)')) return;
  }
  const patch = { status: 'done' };
  if (text) patch.feedback_rafa = text;
  updateTask(id, patch);
}

// === CRIAR TAREFA ===
function openNewTaskModal() {
  document.getElementById('ntTitle').value = '';
  document.getElementById('ntDesc').value = '';
  document.getElementById('ntCategory').value = '';
  document.getElementById('ntDueDate').value = '';
  document.getElementById('ntAssignee').value = 'andrade';
  document.getElementById('ntPriority').value = 'media';
  document.getElementById('newTaskModalBg').classList.add('open');
  setTimeout(() => document.getElementById('ntTitle').focus(), 100);
}
function closeNewTaskModal() {
  document.getElementById('newTaskModalBg').classList.remove('open');
}
async function submitNewTask() {
  const title    = document.getElementById('ntTitle').value.trim();
  const description = document.getElementById('ntDesc').value.trim();
  const assignee = document.getElementById('ntAssignee').value;
  const priority = document.getElementById('ntPriority').value;
  const category = document.getElementById('ntCategory').value.trim() || undefined;
  const due_date = document.getElementById('ntDueDate').value || undefined;

  if (!title) { toast('título obrigatório', 'error'); return; }

  try {
    const r = await fetch('/api/tasks-create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: JSON.stringify({ title, description, assignee, priority, category, due_date }),
    });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    if (!r.ok) { toast('erro: ' + (data.error || r.status), 'error'); return; }
    toast('tarefa criada' + (data.notif?.ok ? ' + whats enviado' : ''), 'success');
    closeNewTaskModal();
    loadTasks();
  } catch(e) {
    toast('erro: ' + e.message, 'error');
  }
}

// === MODO RAFA ===
function detectRafaMode() {
  const params = new URLSearchParams(window.location.search);
  const tokenFromUrl = params.get('t');
  const tokenSaved = localStorage.getItem(RAFA_TOKEN_KEY);
  const token = tokenFromUrl || tokenSaved;
  if (!token) return false;

  rafaToken = token;
  if (tokenFromUrl) localStorage.setItem(RAFA_TOKEN_KEY, tokenFromUrl);
  return true;
}

async function loginRafa() {
  try {
    const r = await fetch('/api/tasks-list?limit=1', { headers: { 'x-rafa-token': rafaToken } });
    if (r.status === 401) {
      localStorage.removeItem(RAFA_TOKEN_KEY);
      rafaMode = false;
      rafaToken = '';
      return false;
    }
    if (!r.ok) return false;
    rafaMode = true;
    return true;
  } catch (e) {
    console.error('[loginRafa]', e);
    return false;
  }
}

function applyRafaUI() {
  document.querySelectorAll('.tab').forEach(tab => {
    if (tab.dataset.tab !== 'tarefas') tab.style.display = 'none';
  });
  document.getElementById('btnNewTask').style.display = 'none';
  document.querySelectorAll('.filter-chip[data-tfilter]').forEach(c => {
    if (['andrade','code','done'].includes(c.dataset.tfilter)) c.style.display = 'none';
  });
  document.querySelector('.topbar h1').textContent = 'Drope ✦ tarefas';
  switchTab('tarefas');
}

// === ENTER NA INPUT DO LOGIN ===
document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// === BOOT (modo Rafa via URL OU auto-login admin) ===
window.addEventListener('DOMContentLoaded', async () => {
  // 1) Modo Rafa via ?t=TOKEN (ou token salvo de visita anterior)
  if (detectRafaMode()) {
    const ok = await loginRafa();
    if (ok) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      applyRafaUI();
      startPolling();
      return;
    }
  }

  // 2) Auto-login admin (Andrade) se token salvo
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    document.getElementById('tokenInput').value = saved;
    try {
      const r = await fetch('/api/admin-orders?limit=1', { headers: { 'x-admin-token': saved } });
      if (r.ok) {
        adminToken = saved;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        startPolling();
      }
    } catch(e) {}
  }
});
</script>
